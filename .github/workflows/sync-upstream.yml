name: Sync Upstream

on:
  schedule:
    - cron: '0 */12 * * *'   # 每12小时自动运行一次
  workflow_dispatch:          # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Add upstream repository
        run: |
          git remote add upstream https://github.com/wangwangit/SubsTracker.git
          git fetch upstream

      - name: Merge upstream/master into your master
        run: |
          git checkout master
          git merge upstream/master --no-edit --allow-unrelated-histories

      - name: Push changes to your fork
        run: git push origin master
